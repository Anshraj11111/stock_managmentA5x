<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test File Upload</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .upload-box {
            border: 2px dashed #ccc;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <h1>🧪 Test File Upload</h1>
    <p>This page tests the bulk import file upload functionality.</p>

    <div class="upload-box">
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.pdf">
        <br><br>
        <button onclick="uploadFile()">Upload & Test</button>
    </div>

    <div>
        <label>Auth Token (from localStorage):</label>
        <input type="text" id="token" style="width: 100%; padding: 8px; margin: 10px 0;">
        <small>Get this from your browser's localStorage after logging in</small>
    </div>

    <div id="result"></div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const token = document.getElementById('token').value;
            const resultDiv = document.getElementById('result');

            if (!fileInput.files[0]) {
                alert('Please select a file');
                return;
            }

            if (!token) {
                alert('Please enter your auth token');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            resultDiv.textContent = 'Uploading...';
            resultDiv.className = '';

            try {
                const response = await fetch('http://localhost:5000/api/import/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.textContent = JSON.stringify(data, null, 2);
                } else {
                    resultDiv.className = 'error';
                    resultDiv.textContent = 'Error: ' + JSON.stringify(data, null, 2);
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.textContent = 'Network Error: ' + error.message;
            }
        }

        // Try to get token from localStorage if available
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                document.getElementById('token').value = token;
            }
        });
    </script>
</body>
</html>
